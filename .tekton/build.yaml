apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
    name: my-pipeline
    labels:
        app.kubernetes.io/managed-by: tkn-dsl
    annotations:
        pipelinesascode.tekton.dev/on-event: '[push]'
        pipelinesascode.tekton.dev/on-path-change: '[src/**]'
        pipelinesascode.tekton.dev/on-target-branch: '[main]'
        pipelinesascode.tekton.dev/task: s2i-java:0.8.0
        pipelinesascode.tekton.dev/task-1: maven:0.4.0
        pipelinesascode.tekton.dev/task-2: git-clone:0.10.0
spec:
    pipelineSpec:
        params:
            - name: image_url
              type: string
              default: quay.io/siamaksade/spring-petclinic:{{ source_branch }}
        workspaces:
            - name: shared-workspace
            - name: secret-git-credentials
        tasks:
            - name: git
              taskRef:
                name: git-clone:0.10.0
              params:
                - name: revision
                  value: '{{ revision }}'
                - name: url
                  value: '{{ repo_url }}'
              workspaces:
                - name: shared-workspace
                  workspace: shared-workspace
            - name: build-jar
              taskRef:
                name: maven:0.4.0
              runAfter:
                - git
              params:
                - name: GOALS
                  value:
                    - clean
                    - package
              workspaces:
                - name: shared-workspace
                  workspace: shared-workspace
            - name: build-image
              taskRef:
                name: s2i-java:0.8.0
              runAfter:
                - build-jar
              params:
                - name: IMAGE
                  value: '{{ image_url }}'
              workspaces:
                - name: shared-workspace
                  workspace: shared-workspace
            - name: deploy
              taskSpec:
                workspaces:
                    - name: shared-workspace
                steps:
                    - name: deploy
                      image: registry.redhat.io/rhel8/nodejs-22-minimal:latest
                      script: |-
                        #!/bin/sh
                        npx ascii-themes generate OpenShift
              runAfter:
                - build-image
              workspaces:
                - name: shared-workspace
                  workspace: shared-workspace
    workspaces:
        - name: shared-workspace
          volumeClaimTemplate:
            spec:
                accessModes:
                    - ReadWriteOnce
                resources:
                    requests:
                        storage: 1Gi
        - name: secret-git-credentials
          secret:
            secretName: quay-credentials
