apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
    name: spring-petclinic
    labels:
        app.kubernetes.io/managed-by: tkn-dsl
    annotations:
        pipelinesascode.tekton.dev/on-event: '[push]'
        pipelinesascode.tekton.dev/on-target-branch: '[main]'
spec:
    pipelineSpec:
        params:
            - name: image_url
              type: string
              default: quay.io/siamaksade/spring-petclinic:{{ source_branch }}
        workspaces:
            - name: shared-workspace
            - name: secret-quay-credentials
        tasks:
            - name: git-source
              taskSpec:
                description: |-
                    These Tasks are Git tasks to work with repositories used by other tasks in your Pipeline.
                    The git-clone Task will clone a repo from the provided url into the output Workspace. By default the repo will be cloned into the root of your Workspace. You can clone into a subdirectory by setting this Task's subdirectory param. This Task also supports sparse checkouts. To perform a sparse checkout, pass a list of comma separated directory patterns to this Task's sparseCheckoutDirectories param.
                params:
                    - description: Repository URL to clone from.
                      name: url
                      type: string
                    - default: ""
                      description: Revision to checkout. (branch, tag, sha, ref, etc...)
                      name: revision
                      type: string
                    - default: ""
                      description: Refspec to fetch before checking out revision.
                      name: refspec
                    - default: "true"
                      description: Initialize and fetch git submodules.
                      name: submodules
                      type: string
                    - default: "1"
                      description: Perform a shallow clone, fetching only the most recent N commits.
                      name: depth
                      type: string
                    - default: "true"
                      description: Set the `http.sslVerify` global git config. Setting this to `false` is not advised unless you are sure that you trust your git remote.
                      name: sslVerify
                      type: string
                    - default: ca-bundle.crt
                      description: file name of mounted crt using ssl-ca-directory workspace. default value is ca-bundle.crt.
                      name: crtFileName
                      type: string
                    - default: ""
                      description: Subdirectory inside the `output` Workspace to clone the repo into.
                      name: subdirectory
                      type: string
                    - default: ""
                      description: Define the directory patterns to match or exclude when performing a sparse checkout.
                      name: sparseCheckoutDirectories
                      type: string
                    - default: "true"
                      description: Clean out the contents of the destination directory if it already exists before cloning.
                      name: deleteExisting
                      type: string
                    - default: ""
                      description: HTTP proxy server for non-SSL requests.
                      name: httpProxy
                      type: string
                    - default: ""
                      description: HTTPS proxy server for SSL requests.
                      name: httpsProxy
                      type: string
                    - default: ""
                      description: Opt out of proxying HTTP/HTTPS requests.
                      name: noProxy
                      type: string
                    - default: "true"
                      description: Log the commands that are executed during `git-clone`'s operation.
                      name: verbose
                      type: string
                    - default: ghcr.io/tektoncd-catalog/git-clone:v1.1.0
                      description: The image providing the git-init binary that this Task runs.
                      name: gitInitImage
                      type: string
                    - default: /home/git
                      description: |
                        Absolute path to the user's home directory.
                      name: userHome
                      type: string
                results:
                    - description: The precise commit SHA that was fetched by this Task.
                      name: commit
                    - description: The precise URL that was fetched by this Task.
                      name: url
                    - description: The epoch timestamp of the commit that was fetched by this Task.
                      name: committer-date
                steps:
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: before-run
                      script: |-
                        #!/bin/sh
                        echo "#### BEFORE RUN
                    - env:
                        - name: HOME
                          value: $(params.userHome)
                        - name: PARAM_URL
                          value: $(params.url)
                        - name: PARAM_REVISION
                          value: $(params.revision)
                        - name: PARAM_REFSPEC
                          value: $(params.refspec)
                        - name: PARAM_SUBMODULES
                          value: $(params.submodules)
                        - name: PARAM_DEPTH
                          value: $(params.depth)
                        - name: PARAM_SSL_VERIFY
                          value: $(params.sslVerify)
                        - name: PARAM_CRT_FILENAME
                          value: $(params.crtFileName)
                        - name: PARAM_SUBDIRECTORY
                          value: $(params.subdirectory)
                        - name: PARAM_DELETE_EXISTING
                          value: $(params.deleteExisting)
                        - name: PARAM_HTTP_PROXY
                          value: $(params.httpProxy)
                        - name: PARAM_HTTPS_PROXY
                          value: $(params.httpsProxy)
                        - name: PARAM_NO_PROXY
                          value: $(params.noProxy)
                        - name: PARAM_VERBOSE
                          value: $(params.verbose)
                        - name: PARAM_SPARSE_CHECKOUT_DIRECTORIES
                          value: $(params.sparseCheckoutDirectories)
                        - name: PARAM_USER_HOME
                          value: $(params.userHome)
                        - name: WORKSPACE_OUTPUT_PATH
                          value: $(workspaces.output.path)
                        - name: WORKSPACE_SSH_DIRECTORY_BOUND
                          value: $(workspaces.ssh-directory.bound)
                        - name: WORKSPACE_SSH_DIRECTORY_PATH
                          value: $(workspaces.ssh-directory.path)
                        - name: WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND
                          value: $(workspaces.basic-auth.bound)
                        - name: WORKSPACE_BASIC_AUTH_DIRECTORY_PATH
                          value: $(workspaces.basic-auth.path)
                        - name: WORKSPACE_SSL_CA_DIRECTORY_BOUND
                          value: $(workspaces.ssl-ca-directory.bound)
                        - name: WORKSPACE_SSL_CA_DIRECTORY_PATH
                          value: $(workspaces.ssl-ca-directory.path)
                      image: $(params.gitInitImage)
                      name: clone
                      script: |
                        #!/usr/bin/env sh
                        set -eu

                        if [ "${PARAM_VERBOSE}" = "true" ] ; then
                          set -x
                        fi

                        if [ "${WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND}" = "true" ] ; then
                          cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.git-credentials" "${PARAM_USER_HOME}/.git-credentials"
                          cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.gitconfig" "${PARAM_USER_HOME}/.gitconfig"
                          chmod 400 "${PARAM_USER_HOME}/.git-credentials"
                          chmod 400 "${PARAM_USER_HOME}/.gitconfig"
                        fi

                        if [ "${WORKSPACE_SSH_DIRECTORY_BOUND}" = "true" ] ; then
                          cp -R "${WORKSPACE_SSH_DIRECTORY_PATH}" "${PARAM_USER_HOME}"/.ssh
                          chmod 700 "${PARAM_USER_HOME}"/.ssh
                          chmod -R 400 "${PARAM_USER_HOME}"/.ssh/*
                        fi

                        if [ "${WORKSPACE_SSL_CA_DIRECTORY_BOUND}" = "true" ] ; then
                           export GIT_SSL_CAPATH="${WORKSPACE_SSL_CA_DIRECTORY_PATH}"
                           if [ "${PARAM_CRT_FILENAME}" != "" ] ; then
                              export GIT_SSL_CAINFO="${WORKSPACE_SSL_CA_DIRECTORY_PATH}/${PARAM_CRT_FILENAME}"
                           fi
                        fi
                        CHECKOUT_DIR="${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

                        cleandir() {
                          # Delete any existing contents of the repo directory if it exists.
                          #
                          # We don't just "rm -rf ${CHECKOUT_DIR}" because ${CHECKOUT_DIR} might be "/"
                          # or the root of a mounted volume.
                          if [ -d "${CHECKOUT_DIR}" ] ; then
                            # Delete non-hidden files and directories
                            rm -rf "${CHECKOUT_DIR:?}"/*
                            # Delete files and directories starting with . but excluding ..
                            rm -rf "${CHECKOUT_DIR}"/.[!.]*
                            # Delete files and directories starting with .. plus any other character
                            rm -rf "${CHECKOUT_DIR}"/..?*
                          fi
                        }

                        if [ "${PARAM_DELETE_EXISTING}" = "true" ] ; then
                          cleandir || true
                        fi

                        test -z "${PARAM_HTTP_PROXY}" || export HTTP_PROXY="${PARAM_HTTP_PROXY}"
                        test -z "${PARAM_HTTPS_PROXY}" || export HTTPS_PROXY="${PARAM_HTTPS_PROXY}"
                        test -z "${PARAM_NO_PROXY}" || export NO_PROXY="${PARAM_NO_PROXY}"

                        git config --global --add safe.directory "${WORKSPACE_OUTPUT_PATH}"
                        /ko-app/git-init \
                          -url="${PARAM_URL}" \
                          -revision="${PARAM_REVISION}" \
                          -refspec="${PARAM_REFSPEC}" \
                          -path="${CHECKOUT_DIR}" \
                          -sslVerify="${PARAM_SSL_VERIFY}" \
                          -submodules="${PARAM_SUBMODULES}" \
                          -depth="${PARAM_DEPTH}" \
                          -sparseCheckoutDirectories="${PARAM_SPARSE_CHECKOUT_DIRECTORIES}"
                        cd "${CHECKOUT_DIR}"
                        RESULT_SHA="$(git rev-parse HEAD)"
                        EXIT_CODE="$?"
                        if [ "${EXIT_CODE}" != 0 ] ; then
                          exit "${EXIT_CODE}"
                        fi
                        RESULT_COMMITTER_DATE="$(git log -1 --pretty=%ct)"
                        printf "%s" "${RESULT_COMMITTER_DATE}" > "$(results.committer-date.path)"
                        printf "%s" "${RESULT_SHA}" > "$(results.commit.path)"
                        printf "%s" "${PARAM_URL}" > "$(results.url.path)"
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 65532
                      volumeMounts:
                        - mountPath: $(params.userHome)
                          name: user-home
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                volumes:
                    - emptyDir: {}
                      name: user-home
                workspaces:
                    - description: The git repo will be cloned onto the volume backing this Workspace.
                      name: output
                    - description: |
                        A .ssh directory with private key, known_hosts, config, etc. Copied to
                        the user's home before git commands are executed. Used to authenticate
                        with the git remote when performing the clone. Binding a Secret to this
                        Workspace is strongly recommended over other volume types.
                      name: ssh-directory
                      optional: true
                    - description: |
                        A Workspace containing a .gitconfig and .git-credentials file. These
                        will be copied to the user's home before any git commands are run. Any
                        other files in this Workspace are ignored. It is strongly recommended
                        to use ssh-directory over basic-auth whenever possible and to bind a
                        Secret to this Workspace over other volume types.
                      name: basic-auth
                      optional: true
                    - description: |
                        A workspace containing CA certificates, this will be used by Git to
                        verify the peer with when fetching or pushing over HTTPS.
                      name: ssl-ca-directory
                      optional: true
              params:
                - name: revision
                  value: '{{ revision }}'
                - name: url
                  value: '{{ repo_url }}'
              workspaces:
                - name: output
                  workspace: shared-workspace
            - name: build-jar
              taskSpec:
                description: This Task can be used to run a Maven build. It uses a workspace to store m2 local repo.
                params:
                    - default: gcr.io/cloud-builders/mvn@sha256:57523fc43394d6d9d2414ee8d1c85ed7a13460cbb268c3cd16d28cfb3859e641
                      description: Maven base image
                      name: MAVEN_IMAGE
                      type: string
                    - default:
                        - package
                      description: maven goals to run
                      name: GOALS
                      type: array
                    - default: ""
                      description: The Maven repository mirror url
                      name: MAVEN_MIRROR_URL
                      type: string
                    - default: ""
                      description: The username for the server
                      name: SERVER_USER
                      type: string
                    - default: ""
                      description: The password for the server
                      name: SERVER_PASSWORD
                      type: string
                    - default: ""
                      description: The username for the proxy server
                      name: PROXY_USER
                      type: string
                    - default: ""
                      description: The password for the proxy server
                      name: PROXY_PASSWORD
                      type: string
                    - default: ""
                      description: Port number for the proxy server
                      name: PROXY_PORT
                      type: string
                    - default: ""
                      description: Proxy server Host
                      name: PROXY_HOST
                      type: string
                    - default: ""
                      description: Non proxy server host
                      name: PROXY_NON_PROXY_HOSTS
                      type: string
                    - default: http
                      description: Protocol for the proxy ie http or https
                      name: PROXY_PROTOCOL
                      type: string
                    - default: .
                      description: The context directory within the repository for sources on which we want to execute maven goals.
                      name: CONTEXT_DIR
                      type: string
                results:
                    - description: Maven project group id
                      name: group-id
                      type: string
                    - description: Maven project artifact id
                      name: artifact-id
                      type: string
                    - description: version
                      name: version
                      type: string
                steps:
                    - args:
                        - '**/pom.xml'
                      env:
                        - name: PARAM_SOURCE
                          value: oci://quay.io/siamaksade/spring-petclinic-m2-cache:m2-{{hash}}
                        - name: PARAM_CACHE_PATH
                          value: /workspace/maven-local-repo/.m2
                        - name: PARAM_WORKING_DIR
                          value: $(workspaces.source.path)
                        - name: PARAM_INSECURE
                          value: "false"
                        - name: DOCKER_CONFIG
                          value: $(workspaces.secret-quay-credentials.path)
                      image: registry.redhat.io/openshift-pipelines/pipelines-cache-rhel9@sha256:ce548401247c025aa5dee6ed641ede514a8ce19cbfb6fbe41edeabcdb1d493f2
                      name: cache-fetch-m2
                      results:
                        - name: fetched
                          type: string
                      script: |
                        #!/bin/sh
                        PATTERN_FLAGS=""
                        echo "Patterns: $@"
                        for p in "$@"; do
                          PATTERN_FLAGS="${PATTERN_FLAGS} --pattern ${p}"
                        done

                        set -x
                        /ko-app/cache fetch ${PATTERN_FLAGS} \
                                            --source ${PARAM_SOURCE} \
                                            --folder ${PARAM_CACHE_PATH} \
                                            --insecure ${PARAM_INSECURE} \
                                            --workingdir ${PARAM_WORKING_DIR}
                        if [ $? -eq 0 ]; then
                          echo -n true > $(step.results.fetched.path)
                        else
                          echo -n false > $(step.results.fetched.path)
                        fi
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: before-run
                      script: |-
                        #!/bin/sh
                        echo "#### BEFORE RUN
                    - image: registry.access.redhat.com/ubi8/ubi-minimal:8.2
                      name: mvn-settings
                      script: |
                        #!/usr/bin/env bash

                        [[ -f $(workspaces.maven-settings.path)/settings.xml ]] && \
                        echo "using existing $(workspaces.maven-settings.path)/settings.xml" && exit 0

                        cat > "$(workspaces.maven-settings.path)/settings.xml" <<EOF
                        <settings>
                          <servers>
                            <!-- The servers added here are generated from environment variables. Don't change. -->
                            <!-- ### SERVER's USER INFO from ENV ### -->
                          </servers>
                          <mirrors>
                            <!-- The mirrors added here are generated from environment variables. Don't change. -->
                            <!-- ### mirrors from ENV ### -->
                          </mirrors>
                          <proxies>
                            <!-- The proxies added here are generated from environment variables. Don't change. -->
                            <!-- ### HTTP proxy from ENV ### -->
                          </proxies>
                        </settings>
                        EOF

                        xml=""
                        if [ -n "$(params.PROXY_HOST)" ] && [ -n "$(params.PROXY_PORT)" ]; then
                          xml="<proxy>\
                            <id>genproxy</id>\
                            <active>true</active>\
                            <protocol>$(params.PROXY_PROTOCOL)</protocol>\
                            <host>$(params.PROXY_HOST)</host>\
                            <port>$(params.PROXY_PORT)</port>"
                          if [ -n "$(params.PROXY_USER)" ] && [ -n "$(params.PROXY_PASSWORD)" ]; then
                            xml="$xml\
                                <username>$(params.PROXY_USER)</username>\
                                <password>$(params.PROXY_PASSWORD)</password>"
                          fi
                          if [ -n "$(params.PROXY_NON_PROXY_HOSTS)" ]; then
                            xml="$xml\
                                <nonProxyHosts>$(params.PROXY_NON_PROXY_HOSTS)</nonProxyHosts>"
                          fi
                          xml="$xml\
                              </proxy>"
                          sed -i "s|<!-- ### HTTP proxy from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
                        fi

                        if [ -n "$(params.SERVER_USER)" ] && [ -n "$(params.SERVER_PASSWORD)" ]; then
                          xml="<server>\
                            <id>serverid</id>"
                          xml="$xml\
                                <username>$(params.SERVER_USER)</username>\
                                <password>$(params.SERVER_PASSWORD)</password>"
                          xml="$xml\
                              </server>"
                          sed -i "s|<!-- ### SERVER's USER INFO from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
                        fi

                        if [ -n "$(params.MAVEN_MIRROR_URL)" ]; then
                          xml="    <mirror>\
                            <id>mirror.default</id>\
                            <url>$(params.MAVEN_MIRROR_URL)</url>\
                            <mirrorOf>central</mirrorOf>\
                          </mirror>"
                          sed -i "s|<!-- ### mirrors from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
                        fi
                    - args:
                        - $(params.GOALS[*])
                      image: $(params.MAVEN_IMAGE)
                      name: mvn-goals
                      script: |
                        #!/usr/bin/env bash

                        /usr/bin/mvn -s $(workspaces.maven-settings.path)/settings.xml "$@" '-Dmaven.repo.local=$(workspaces.maven-local-repo.path)/.m2'

                        GROUPID=$(/usr/bin/mvn -s $(workspaces.maven-settings.path)/settings.xml '-Dmaven.repo.local=$(workspaces.maven-local-repo.path)/.m2' -q -Dexec.executable=echo -Dexec.args='${project.groupId}' --non-recursive exec:exec)
                        echo -n $GROUPID | tee $(results.group-id.path)
                        ARTIFACTID=$(/usr/bin/mvn -s $(workspaces.maven-settings.path)/settings.xml '-Dmaven.repo.local=$(workspaces.maven-local-repo.path)/.m2' -q -Dexec.executable=echo -Dexec.args='${project.artifactId}' --non-recursive exec:exec)
                        echo -n $ARTIFACTID | tee $(results.artifact-id.path)
                        VERSION=$(/usr/bin/mvn -s $(workspaces.maven-settings.path)/settings.xml '-Dmaven.repo.local=$(workspaces.maven-local-repo.path)/.m2' -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
                        echo -n $VERSION | tee $(results.version.path)
                      workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                    - args:
                        - '**/pom.xml'
                      env:
                        - name: PARAM_TARGET
                          value: oci://quay.io/siamaksade/spring-petclinic-m2-cache:m2-{{hash}}
                        - name: PARAM_CACHE_PATH
                          value: /workspace/maven-local-repo/.m2
                        - name: PARAM_WORKING_DIR
                          value: $(workspaces.source.path)
                        - name: PARAM_INSECURE
                          value: "false"
                        - name: RESULT_CACHE_FETCHED
                          value: $(steps.cache-fetch-m2.results.fetched)
                        - name: PARAM_FORCE_CACHE_UPLOAD
                          value: "false"
                        - name: DOCKER_CONFIG
                          value: $(workspaces.secret-quay-credentials.path)
                      image: registry.redhat.io/openshift-pipelines/pipelines-cache-rhel9@sha256:ce548401247c025aa5dee6ed641ede514a8ce19cbfb6fbe41edeabcdb1d493f2
                      name: cache-upload-m2
                      script: |
                        #!/bin/sh
                        if [ "${PARAM_FORCE_CACHE_UPLOAD}" = "false" ] && [ "${RESULT_CACHE_FETCHED}" = "true" ]; then
                          echo "no need to upload cache"
                          exit 0
                        fi

                        PATTERN_FLAGS=""
                        echo "Patterns: $@"
                        for p in "$@"; do
                          PATTERN_FLAGS="${PATTERN_FLAGS} --pattern ${p}"
                        done

                        set -ex
                        /ko-app/cache upload ${PATTERN_FLAGS} \
                                            --target ${PARAM_TARGET} \
                                            --folder ${PARAM_CACHE_PATH} \
                                            --insecure ${PARAM_INSECURE} \
                                            --workingdir ${PARAM_WORKING_DIR}
                workspaces:
                    - description: The workspace consisting of maven project.
                      name: source
                    - description: The workspace consisting of the custom maven settings provided by the user.
                      name: maven-settings
                    - description: Local repo (m2) workspace
                      name: maven-local-repo
                      optional: true
              runAfter:
                - git-source
              params:
                - name: GOALS
                  value:
                    - clean
                    - package
                    - -Dcheckstyle.skip=true
              workspaces:
                - name: source
                  workspace: shared-workspace
                - name: maven-settings
                  workspace: shared-workspace
                - name: maven-local-repo
                  workspace: shared-workspace
            - name: build-image
              taskSpec:
                description: |4
                    Buildah task builds source into a container image and
                    then pushes it to a container registry.
                params:
                    - description: |
                        Fully qualified container image name to be built by buildah.
                      name: IMAGE
                      type: string
                    - default: ./Dockerfile
                      description: |
                        Path to the `Dockerfile` (or `Containerfile`) relative to the `source` workspace.
                      name: DOCKERFILE
                      type: string
                    - default:
                        - ""
                      description: |
                        Dockerfile build arguments, array of key=value
                      name: BUILD_ARGS
                      type: array
                    - default: .
                      description: |
                        Path to the directory to use as context.
                      name: CONTEXT
                      type: string
                    - default: vfs
                      description: |
                        Set buildah storage driver to reflect the currrent cluster node's
                        settings.
                      name: STORAGE_DRIVER
                      type: string
                    - default: oci
                      description: The format of the built container, oci or docker
                      name: FORMAT
                      type: string
                    - default: ""
                      description: |
                        Extra parameters passed for the build command when building images.
                      name: BUILD_EXTRA_ARGS
                      type: string
                    - default: ""
                      description: |
                        Extra parameters passed for the push command when pushing images.
                      name: PUSH_EXTRA_ARGS
                      type: string
                    - default: "false"
                      description: |
                        Skip pushing the image to the container registry.
                      name: SKIP_PUSH
                      type: string
                    - default: "true"
                      description: |
                        Sets the TLS verification flag, `true` is recommended.
                      name: TLS_VERIFY
                      type: string
                    - default: "false"
                      description: |
                        Turns on verbose logging, all commands executed will be printed out.
                      name: VERBOSE
                      type: string
                results:
                    - description: |
                        Fully qualified image name.
                      name: IMAGE_URL
                      type: string
                    - description: |
                        Digest of the image just built.
                      name: IMAGE_DIGEST
                      type: string
                stepTemplate:
                    computeResources: {}
                    env:
                        - name: PARAMS_IMAGE
                          value: $(params.IMAGE)
                        - name: PARAMS_CONTEXT
                          value: $(params.CONTEXT)
                        - name: PARAMS_DOCKERFILE
                          value: $(params.DOCKERFILE)
                        - name: PARAMS_FORMAT
                          value: $(params.FORMAT)
                        - name: PARAMS_STORAGE_DRIVER
                          value: $(params.STORAGE_DRIVER)
                        - name: PARAMS_BUILD_EXTRA_ARGS
                          value: $(params.BUILD_EXTRA_ARGS)
                        - name: PARAMS_PUSH_EXTRA_ARGS
                          value: $(params.PUSH_EXTRA_ARGS)
                        - name: PARAMS_SKIP_PUSH
                          value: $(params.SKIP_PUSH)
                        - name: PARAMS_TLS_VERIFY
                          value: $(params.TLS_VERIFY)
                        - name: PARAMS_VERBOSE
                          value: $(params.VERBOSE)
                        - name: WORKSPACES_SOURCE_BOUND
                          value: $(workspaces.source.bound)
                        - name: WORKSPACES_SOURCE_PATH
                          value: $(workspaces.source.path)
                        - name: WORKSPACES_DOCKERCONFIG_BOUND
                          value: $(workspaces.dockerconfig.bound)
                        - name: WORKSPACES_DOCKERCONFIG_PATH
                          value: $(workspaces.dockerconfig.path)
                        - name: WORKSPACES_RHEL_ENTITLEMENT_BOUND
                          value: $(workspaces.rhel-entitlement.bound)
                        - name: WORKSPACES_RHEL_ENTITLEMENT_PATH
                          value: $(workspaces.rhel-entitlement.path)
                        - name: RESULTS_IMAGE_URL_PATH
                          value: $(results.IMAGE_URL.path)
                        - name: RESULTS_IMAGE_DIGEST_PATH
                          value: $(results.IMAGE_DIGEST.path)
                steps:
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: before-run
                      script: |-
                        #!/bin/sh
                        echo "#### BEFORE RUN
                    - args:
                        - $(params.BUILD_ARGS[*])
                      computeResources: {}
                      image: registry.redhat.io/rhel9/buildah@sha256:4e604d18fc609d25b2fc99814281944acaac78e8cd5e47b8359709b8b505db86
                      name: build
                      script: |
                        set -e
                        printf '%s' "" |base64 -d >"/scripts/buildah-bud.sh"
                        printf '%s' "" |base64 -d >"/scripts/buildah-common.sh"
                        printf '%s' "" |base64 -d >"/scripts/common.sh"
                        ls /scripts/buildah-*.sh;
                        chmod +x /scripts/buildah-*.sh;echo "Running Script /scripts/buildah-bud.sh";
                          /scripts/buildah-bud.sh "$@";
                      securityContext:
                        capabilities:
                            add:
                                - SETFCAP
                      volumeMounts:
                        - mountPath: /scripts
                          name: scripts-dir
                      workingDir: $(workspaces.source.path)
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                volumes:
                    - emptyDir: {}
                      name: scripts-dir
                workspaces:
                    - description: |
                        Container build context, like for instnace a application source code
                        followed by a `Dockerfile`.
                      name: source
                    - description: An optional workspace that allows providing a .docker/config.json file for Buildah to access the container registry. The file should be placed at the root of the Workspace with name config.json or .dockerconfigjson.
                      name: dockerconfig
                      optional: true
                    - description: An optional workspace that allows providing the entitlement keys for Buildah to access subscription. The mounted workspace contains entitlement.pem and entitlement-key.pem.
                      mountPath: /tmp/entitlement
                      name: rhel-entitlement
                      optional: true
              runAfter:
                - build-jar
              params:
                - name: IMAGE
                  value: $(params.image_url)
                - name: TLS_VERIFY
                  value: false
              workspaces:
                - name: source
                  workspace: shared-workspace
                - name: rhel-entitlement
                  workspace: shared-workspace
            - name: security-scan
              taskSpec:
                description: |-
                    Trivy is a simple and comprehensive scanner for vulnerabilities in container images,file systems ,and Git repositories, as well as for configuration issues.
                    This task can be used to scan for vulnenrabilities on the source code in stand alone mode.
                params:
                    - description: The Arguments to be passed to Trivy command.
                      name: ARGS
                      type: array
                    - default: docker.io/aquasec/trivy@sha256:944a044451791617cc0ed2ee4d1942a4f66b790d527fcd0575a6b399ccbc05a1
                      description: Trivy scanner image to be used
                      name: TRIVY_IMAGE
                    - description: Image or Path to be scanned by trivy.
                      name: IMAGE_PATH
                      type: string
                    - default: "false"
                      description: a flag enabling Air-Gapped mode
                      name: AIR_GAPPED_ENABLED
                      type: string
                steps:
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: before-run
                      script: |-
                        #!/bin/sh
                        echo "#### BEFORE RUN
                    - args:
                        - $(params.ARGS)
                      image: $(params.TRIVY_IMAGE)
                      name: trivy-scan
                      script: |
                        #!/usr/bin/env sh
                          cmd="trivy $* "
                          if [ "$(params.AIR_GAPPED_ENABLED)" = "true" ]; then
                            echo "Air-Gapped mode enabled"
                            TRIVY_TEMP_DIR=$(mktemp -d)
                            trivy --cache-dir "$TRIVY_TEMP_DIR" image --download-db-only
                            tar -cf ./db.tar.gz -C "$TRIVY_TEMP_DIR/db" metadata.json trivy.db
                            rm -rf "$TRIVY_TEMP_DIR"
                            mkdir -p "$HOME"/.cache/trivy/db
                            tar xvf ./db.tar.gz -C "$HOME"/.cache/trivy/db
                            cmd="${cmd}--skip-update "
                          fi
                          cmd="${cmd}$(params.IMAGE_PATH)"
                          echo "Running trivy task with command below"
                          echo "$cmd"
                          eval "$cmd"
                      workingDir: $(workspaces.manifest-dir.path)
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                workspaces:
                    - name: manifest-dir
              runAfter:
                - build-image
              params:
                - name: ARGS
                  value:
                    - image
                    - --severity
                    - HIGH,CRITICAL
                    - --exit-code
                    - "0"
                - name: IMAGE_PATH
                  value: $(tasks.build-image.results.IMAGE_URL)@$(tasks.build-image.results.IMAGE_DIGEST)
                - name: TRIVY_IMAGE
                  value: docker.io/aquasec/trivy:latest
              workspaces:
                - name: manifest-dir
                  workspace: shared-workspace
            - name: git-manifests
              taskSpec:
                description: |-
                    These Tasks are Git tasks to work with repositories used by other tasks in your Pipeline.
                    The git-clone Task will clone a repo from the provided url into the output Workspace. By default the repo will be cloned into the root of your Workspace. You can clone into a subdirectory by setting this Task's subdirectory param. This Task also supports sparse checkouts. To perform a sparse checkout, pass a list of comma separated directory patterns to this Task's sparseCheckoutDirectories param.
                params:
                    - description: Repository URL to clone from.
                      name: url
                      type: string
                    - default: ""
                      description: Revision to checkout. (branch, tag, sha, ref, etc...)
                      name: revision
                      type: string
                    - default: ""
                      description: Refspec to fetch before checking out revision.
                      name: refspec
                    - default: "true"
                      description: Initialize and fetch git submodules.
                      name: submodules
                      type: string
                    - default: "1"
                      description: Perform a shallow clone, fetching only the most recent N commits.
                      name: depth
                      type: string
                    - default: "true"
                      description: Set the `http.sslVerify` global git config. Setting this to `false` is not advised unless you are sure that you trust your git remote.
                      name: sslVerify
                      type: string
                    - default: ca-bundle.crt
                      description: file name of mounted crt using ssl-ca-directory workspace. default value is ca-bundle.crt.
                      name: crtFileName
                      type: string
                    - default: ""
                      description: Subdirectory inside the `output` Workspace to clone the repo into.
                      name: subdirectory
                      type: string
                    - default: ""
                      description: Define the directory patterns to match or exclude when performing a sparse checkout.
                      name: sparseCheckoutDirectories
                      type: string
                    - default: "true"
                      description: Clean out the contents of the destination directory if it already exists before cloning.
                      name: deleteExisting
                      type: string
                    - default: ""
                      description: HTTP proxy server for non-SSL requests.
                      name: httpProxy
                      type: string
                    - default: ""
                      description: HTTPS proxy server for SSL requests.
                      name: httpsProxy
                      type: string
                    - default: ""
                      description: Opt out of proxying HTTP/HTTPS requests.
                      name: noProxy
                      type: string
                    - default: "true"
                      description: Log the commands that are executed during `git-clone`'s operation.
                      name: verbose
                      type: string
                    - default: ghcr.io/tektoncd-catalog/git-clone:v1.1.0
                      description: The image providing the git-init binary that this Task runs.
                      name: gitInitImage
                      type: string
                    - default: /home/git
                      description: |
                        Absolute path to the user's home directory.
                      name: userHome
                      type: string
                results:
                    - description: The precise commit SHA that was fetched by this Task.
                      name: commit
                    - description: The precise URL that was fetched by this Task.
                      name: url
                    - description: The epoch timestamp of the commit that was fetched by this Task.
                      name: committer-date
                steps:
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: before-run
                      script: |-
                        #!/bin/sh
                        echo "#### BEFORE RUN
                    - env:
                        - name: HOME
                          value: $(params.userHome)
                        - name: PARAM_URL
                          value: $(params.url)
                        - name: PARAM_REVISION
                          value: $(params.revision)
                        - name: PARAM_REFSPEC
                          value: $(params.refspec)
                        - name: PARAM_SUBMODULES
                          value: $(params.submodules)
                        - name: PARAM_DEPTH
                          value: $(params.depth)
                        - name: PARAM_SSL_VERIFY
                          value: $(params.sslVerify)
                        - name: PARAM_CRT_FILENAME
                          value: $(params.crtFileName)
                        - name: PARAM_SUBDIRECTORY
                          value: $(params.subdirectory)
                        - name: PARAM_DELETE_EXISTING
                          value: $(params.deleteExisting)
                        - name: PARAM_HTTP_PROXY
                          value: $(params.httpProxy)
                        - name: PARAM_HTTPS_PROXY
                          value: $(params.httpsProxy)
                        - name: PARAM_NO_PROXY
                          value: $(params.noProxy)
                        - name: PARAM_VERBOSE
                          value: $(params.verbose)
                        - name: PARAM_SPARSE_CHECKOUT_DIRECTORIES
                          value: $(params.sparseCheckoutDirectories)
                        - name: PARAM_USER_HOME
                          value: $(params.userHome)
                        - name: WORKSPACE_OUTPUT_PATH
                          value: $(workspaces.output.path)
                        - name: WORKSPACE_SSH_DIRECTORY_BOUND
                          value: $(workspaces.ssh-directory.bound)
                        - name: WORKSPACE_SSH_DIRECTORY_PATH
                          value: $(workspaces.ssh-directory.path)
                        - name: WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND
                          value: $(workspaces.basic-auth.bound)
                        - name: WORKSPACE_BASIC_AUTH_DIRECTORY_PATH
                          value: $(workspaces.basic-auth.path)
                        - name: WORKSPACE_SSL_CA_DIRECTORY_BOUND
                          value: $(workspaces.ssl-ca-directory.bound)
                        - name: WORKSPACE_SSL_CA_DIRECTORY_PATH
                          value: $(workspaces.ssl-ca-directory.path)
                      image: $(params.gitInitImage)
                      name: clone
                      script: |
                        #!/usr/bin/env sh
                        set -eu

                        if [ "${PARAM_VERBOSE}" = "true" ] ; then
                          set -x
                        fi

                        if [ "${WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND}" = "true" ] ; then
                          cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.git-credentials" "${PARAM_USER_HOME}/.git-credentials"
                          cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.gitconfig" "${PARAM_USER_HOME}/.gitconfig"
                          chmod 400 "${PARAM_USER_HOME}/.git-credentials"
                          chmod 400 "${PARAM_USER_HOME}/.gitconfig"
                        fi

                        if [ "${WORKSPACE_SSH_DIRECTORY_BOUND}" = "true" ] ; then
                          cp -R "${WORKSPACE_SSH_DIRECTORY_PATH}" "${PARAM_USER_HOME}"/.ssh
                          chmod 700 "${PARAM_USER_HOME}"/.ssh
                          chmod -R 400 "${PARAM_USER_HOME}"/.ssh/*
                        fi

                        if [ "${WORKSPACE_SSL_CA_DIRECTORY_BOUND}" = "true" ] ; then
                           export GIT_SSL_CAPATH="${WORKSPACE_SSL_CA_DIRECTORY_PATH}"
                           if [ "${PARAM_CRT_FILENAME}" != "" ] ; then
                              export GIT_SSL_CAINFO="${WORKSPACE_SSL_CA_DIRECTORY_PATH}/${PARAM_CRT_FILENAME}"
                           fi
                        fi
                        CHECKOUT_DIR="${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

                        cleandir() {
                          # Delete any existing contents of the repo directory if it exists.
                          #
                          # We don't just "rm -rf ${CHECKOUT_DIR}" because ${CHECKOUT_DIR} might be "/"
                          # or the root of a mounted volume.
                          if [ -d "${CHECKOUT_DIR}" ] ; then
                            # Delete non-hidden files and directories
                            rm -rf "${CHECKOUT_DIR:?}"/*
                            # Delete files and directories starting with . but excluding ..
                            rm -rf "${CHECKOUT_DIR}"/.[!.]*
                            # Delete files and directories starting with .. plus any other character
                            rm -rf "${CHECKOUT_DIR}"/..?*
                          fi
                        }

                        if [ "${PARAM_DELETE_EXISTING}" = "true" ] ; then
                          cleandir || true
                        fi

                        test -z "${PARAM_HTTP_PROXY}" || export HTTP_PROXY="${PARAM_HTTP_PROXY}"
                        test -z "${PARAM_HTTPS_PROXY}" || export HTTPS_PROXY="${PARAM_HTTPS_PROXY}"
                        test -z "${PARAM_NO_PROXY}" || export NO_PROXY="${PARAM_NO_PROXY}"

                        git config --global --add safe.directory "${WORKSPACE_OUTPUT_PATH}"
                        /ko-app/git-init \
                          -url="${PARAM_URL}" \
                          -revision="${PARAM_REVISION}" \
                          -refspec="${PARAM_REFSPEC}" \
                          -path="${CHECKOUT_DIR}" \
                          -sslVerify="${PARAM_SSL_VERIFY}" \
                          -submodules="${PARAM_SUBMODULES}" \
                          -depth="${PARAM_DEPTH}" \
                          -sparseCheckoutDirectories="${PARAM_SPARSE_CHECKOUT_DIRECTORIES}"
                        cd "${CHECKOUT_DIR}"
                        RESULT_SHA="$(git rev-parse HEAD)"
                        EXIT_CODE="$?"
                        if [ "${EXIT_CODE}" != 0 ] ; then
                          exit "${EXIT_CODE}"
                        fi
                        RESULT_COMMITTER_DATE="$(git log -1 --pretty=%ct)"
                        printf "%s" "${RESULT_COMMITTER_DATE}" > "$(results.committer-date.path)"
                        printf "%s" "${RESULT_SHA}" > "$(results.commit.path)"
                        printf "%s" "${PARAM_URL}" > "$(results.url.path)"
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 65532
                      volumeMounts:
                        - mountPath: $(params.userHome)
                          name: user-home
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                volumes:
                    - emptyDir: {}
                      name: user-home
                workspaces:
                    - description: The git repo will be cloned onto the volume backing this Workspace.
                      name: output
                    - description: |
                        A .ssh directory with private key, known_hosts, config, etc. Copied to
                        the user's home before git commands are executed. Used to authenticate
                        with the git remote when performing the clone. Binding a Secret to this
                        Workspace is strongly recommended over other volume types.
                      name: ssh-directory
                      optional: true
                    - description: |
                        A Workspace containing a .gitconfig and .git-credentials file. These
                        will be copied to the user's home before any git commands are run. Any
                        other files in this Workspace are ignored. It is strongly recommended
                        to use ssh-directory over basic-auth whenever possible and to bind a
                        Secret to this Workspace over other volume types.
                      name: basic-auth
                      optional: true
                    - description: |
                        A workspace containing CA certificates, this will be used by Git to
                        verify the peer with when fetching or pushing over HTTPS.
                      name: ssl-ca-directory
                      optional: true
              runAfter:
                - build-image
              params:
                - name: url
                  value: https://github.com/siamaksade/spring-petclinic-config
              workspaces:
                - name: output
                  workspace: shared-workspace
            - name: deploy
              taskSpec:
                description: |-
                    This task runs commands against the cluster provided by user and if not provided then where the Task is being executed.
                    OpenShift is a Kubernetes distribution from Red Hat which provides oc, the OpenShift CLI that complements kubectl for simplifying deployment and configuration applications on OpenShift.
                params:
                    - default: oc help
                      description: The OpenShift CLI arguments to run
                      name: SCRIPT
                      type: string
                    - default: latest
                      description: The OpenShift Version to use
                      name: VERSION
                      type: string
                stepTemplate:
                    computeResources: {}
                    env:
                        - name: PARAMS_SCRIPT
                          value: $(params.SCRIPT)
                        - name: PARAMS_VERSION
                          value: $(params.VERSION)
                        - name: WORKSPACES_MANIFEST_DIR_BOUND
                          value: $(workspaces.manifest_dir.bound)
                        - name: WORKSPACES_MANIFEST_DIR_PATH
                          value: $(workspaces.manifest_dir.path)
                        - name: WORKSPACES_KUBECONFIG_DIR_BOUND
                          value: $(workspaces.kubeconfig_dir.bound)
                        - name: WORKSPACES_KUBECONFIG_DIR_PATH
                          value: $(workspaces.kubeconfig_dir.path)
                steps:
                    - image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
                      name: before-run
                      script: |
                        #!/bin/sh
                        cd $(workspaces.manifest_dir.path)/environments/dev
                        sed -i "s|spring-petclinic:.*|spring-petclinic:latest@$(tasks.build-image.results.IMAGE_DIGEST)|g" kustomization.yaml
                        cat kustomization.yaml
                    - computeResources: {}
                      env:
                        - name: HOME
                          value: /tekton/home
                      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
                      name: oc
                      script: |
                        set -e
                        printf '%s' "" |base64 -d >"/scripts/common.sh"
                        printf '%s' "" |base64 -d >"/scripts/oc-client.sh"
                        printf '%s' "" |base64 -d >"/scripts/oc-common.sh"
                        chmod +x /scripts/oc-*.sh;echo "Running Script /scripts/oc-client.sh";
                          /scripts/oc-client.sh $@;
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 65532
                      volumeMounts:
                        - mountPath: /scripts
                          name: scripts-dir
                    - image: registry.access.redhat.com/ubi9-minimal
                      name: after-run
                      onError: continue
                      script: |-
                        #!/bin/sh
                        echo "#### AFTER RUN
                volumes:
                    - emptyDir: {}
                      name: scripts-dir
                workspaces:
                    - description: The workspace which contains kubernetes manifests which we want to apply on the cluster.
                      name: manifest_dir
                      optional: true
                    - description: The workspace which contains the the kubeconfig file if in case we want to run the oc command on another cluster.
                      name: kubeconfig_dir
                      optional: true
              runAfter:
                - security-scan
                - git-manifests
              params:
                - name: SCRIPT
                  value: oc apply -k $(workspaces.manifest_dir.path)/environments/dev
              workspaces:
                - name: manifest_dir
                  workspace: shared-workspace
    workspaces:
        - name: shared-workspace
          volumeClaimTemplate:
            spec:
                accessModes:
                    - ReadWriteOnce
                resources:
                    requests:
                        storage: 1Gi
        - name: secret-quay-credentials
          secret:
            secretName: quay-credentials
