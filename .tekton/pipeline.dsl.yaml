name: spring-petclinic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

params:
  image_url: "quay.io/siamaksade/spring-petclinic:{{ source_branch }}"
  git_event: {{event}}

cache:
  image: oci://quay.io/siamaksade/spring-petclinic-m2-cache
  credentials: registry-auth

defaults:
  before_run:
    image: registry.access.redhat.com/ubi9-minimal
    run: echo "BEFORE RUN"
  after_run:
    image: registry.access.redhat.com/ubi9-minimal
    run: echo "AFTER RUN"

secrets:
  dockerconfig: registry-auth

concurrency:
  cancel-in-progress: true

tasks:
  git-source:
    uses: git-clone:0.10.0
    params:
      url: {{ repo_url }}
      revision: {{ revision }}

  build-jar:
    uses: maven:0.4.0
    params:
      GOALS: ["clean", "package", "-Dcheckstyle.skip=true"]
    cache:
      path: /workspace/maven-local-repo/.m2
      key: ["**/pom.xml"]
    tekton:
      stepTemplate:
        resources:
          requests:
            memory: 2Gi

  build-image:
    uses: cluster://openshift-pipelines/buildah
    params:
      IMAGE: $(params.image_url)
      TLS_VERIFY: false

  on-pr:
    if: params.git_event == "pull_request"
    image: docker.io/msoap/ascii-art
    run: neo-cowsay --rainbow "Pull Request!"

  security-scan:
    uses: trivy-scanner
    needs: ["build-image"]
    params:
      ARGS: ["image", "--severity", "HIGH,CRITICAL", "--exit-code", "0"]
      TRIVY_IMAGE: docker.io/aquasec/trivy:latest
      IMAGE_PATH: "$(tasks.build-image.results.IMAGE_URL)@$(tasks.build-image.results.IMAGE_DIGEST)"

  git-manifests:
    uses: git-clone:0.10.0
    needs: ["build-image"]
    params:
      url: https://github.com/siamaksade/spring-petclinic-config

  deploy:
    uses: cluster://openshift-pipelines/openshift-client
    needs: [security-scan, git-manifests]
    before_run: |
      cd $(workspace)/environments/dev
      sed -i "s|spring-petclinic:.*|spring-petclinic:latest@$(tasks.build-image.results.IMAGE_DIGEST)|g" kustomization.yaml
      cat kustomization.yaml
    params:
      SCRIPT: oc apply -k $(workspace)/environments/dev

finally:
  notify:
    image: curlimages/curl:latest
    run: |
      curl -X POST https://hooks.slack.com/ -d '{"text": "Pipeline completed"}'